apiVersion: apps/v1
kind: Deployment
metadata:
  name: kv-cache-indexer
  namespace: llm-d-demo
  labels:
    app: kv-cache-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kv-cache-indexer
  template:
    metadata:
      labels:
        app: kv-cache-indexer
    spec:
      containers:
        - name: indexer
          image: quay.io/llm-d/kv-cache-indexer:v0.7.1
          args:
            - "--config"
            - "/etc/indexer/config.json"
          ports:
            - name: grpc
              containerPort: 9100
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/indexer
          resources:
            limits:
              memory: 4Gi
              cpu: "4"
            requests:
              memory: 2Gi
              cpu: "2"
      volumes:
        - name: config
          configMap:
            name: kv-cache-indexer-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kv-cache-indexer-config
  namespace: llm-d-demo
data:
  config.json: |
    {
      "indexerConfig": {
        "backend": "cost-aware-memory",
        "maxMemoryMB": 2048
      },
      "kvEventsConfig": {
        "engineType": "vllm",
        "endpoints": [
          "tcp://llama-3-1-70b-vllm-predictor-0:5557",
          "tcp://llama-3-1-70b-vllm-predictor-1:5557",
          "tcp://llama-3-1-70b-vllm-predictor-2:5557"
        ],
        "topicFormat": "kv@{pod_id}@{model}"
      },
      "tokenProcessorConfig": {
        "blockSize": 16,
        "hashSeed": 42,
        "tokenizer": {
          "source": "huggingface",
          "model": "meta-llama/Llama-3.1-70B-Instruct",
          "cacheDir": "/tmp/tokenizer-cache"
        }
      },
      "kvCacheBackendConfigs": {
        "gpu": {
          "weight": 1.0
        },
        "cpu": {
          "weight": 0.8
        },
        "storage": {
          "weight": 0.5
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: kv-cache-indexer
  namespace: llm-d-demo
spec:
  selector:
    app: kv-cache-indexer
  ports:
    - name: grpc
      port: 9100
      targetPort: 9100
    - name: metrics
      port: 9090
      targetPort: 9090
