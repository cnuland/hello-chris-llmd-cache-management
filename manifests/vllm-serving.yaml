apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llama-3-1-70b-vllm
  namespace: llm-d-demo
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: pvc://model-store/llama-3.1-70b
    containers:
      - name: kserve-container
        image: quay.io/opendatahub/vllm:latest
        args:
          - "--model"
          - "/mnt/models"
          - "--tensor-parallel-size"
          - "4"
          # CPU KV Cache Offloading
          - "--kv-offloading-size"
          - "128"
          - "--kv-offloading-backend"
          - "native"
          # KV Transfer Config for offloading connector
          - "--kv-transfer-config"
          - '{"kv_connector":"PyNcclConnector","kv_role":"kv_both","kv_rank":0,"kv_parallel_size":1}'
        env:
          # Hash seed must match KV-Cache Indexer configuration
          - name: PYTHONHASHSEED
            value: "42"
        resources:
          limits:
            nvidia.com/gpu: "4"
            memory: 256Gi
            cpu: "32"
          requests:
            nvidia.com/gpu: "4"
            memory: 128Gi
            cpu: "16"
        volumeMounts:
          - name: kv-cache-storage
            mountPath: /kv-cache
          - name: shm
            mountPath: /dev/shm
    volumes:
      - name: kv-cache-storage
        persistentVolumeClaim:
          claimName: kv-cache-shared-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kv-cache-shared-pvc
  namespace: llm-d-demo
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ocs-storagecluster-cephfs
  resources:
    requests:
      storage: 500Gi
